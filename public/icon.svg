<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="felt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b5e20"/>
      <stop offset="100%" style="stop-color:#2e7d32"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Felt table circle -->
  <circle cx="256" cy="256" r="190" fill="url(#felt)" opacity="0.85"/>
  <!-- 3x3 grid lines (representing the board) -->
  <g stroke="#fff" stroke-width="2.5" opacity="0.4">
    <line x1="130" y1="190" x2="382" y2="190"/>
    <line x1="130" y1="256" x2="382" y2="256"/>
    <line x1="130" y1="322" x2="382" y2="322"/>
    <line x1="172" y1="130" x2="172" y2="382"/>
    <line x1="256" y1="130" x2="256" y2="382"/>
    <line x1="340" y1="130" x2="340" y2="382"/>
  </g>
  <!-- Center card (cut card) -->
  <rect x="230" y="228" width="52" height="56" rx="6" fill="#fff" stroke="#c9a83e" stroke-width="2"/>
  <text x="256" y="262" text-anchor="middle" font-family="Georgia,serif" font-size="28" font-weight="bold" fill="#c41e3a">J</text>
  <text x="256" y="278" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#c41e3a">e</text>
  <!-- Top-left card (column team) -->
  <rect x="146" y="160" width="40" height="48" rx="5" fill="#fff" opacity="0.9"/>
  <text x="166" y="190" text-anchor="middle" font-family="Georgia,serif" font-size="20" font-weight="bold" fill="#1a1a2e">5</text>
  <text x="166" y="203" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#1a1a2e">`</text>
  <!-- Bottom-right card (row team) -->
  <rect x="314" y="294" width="40" height="48" rx="5" fill="#fff" opacity="0.9"/>
  <text x="334" y="324" text-anchor="middle" font-family="Georgia,serif" font-size="20" font-weight="bold" fill="#c41e3a">Q</text>
  <text x="334" y="337" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#c41e3a">f</text>
  <!-- Card back (top-right) -->
  <rect x="314" y="160" width="40" height="48" rx="5" fill="#1a237e"/>
  <g opacity="0.3">
    <line x1="314" y1="168" x2="354" y2="208" stroke="#fff" stroke-width="1.5"/>
    <line x1="314" y1="178" x2="344" y2="208" stroke="#fff" stroke-width="1.5"/>
    <line x1="324" y1="160" x2="354" y2="190" stroke="#fff" stroke-width="1.5"/>
  </g>
  <!-- "CC" text at bottom -->
  <text x="256" y="440" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="48" font-weight="bold" fill="#c9a83e" letter-spacing="8">CC</text>
</svg>
